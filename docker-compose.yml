networks:
  essie-net:
    driver: bridge

services:
  influxdb:
    image: influxdb:2.7
    container_name: essie-influxdb
    restart: always
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=essie_org
      - DOCKER_INFLUXDB_INIT_BUCKET=essie_telemetry
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-secret-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - essie-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: essie-postgres
    restart: always
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak123
      POSTGRES_DB: keycloak
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - essie-net

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: essie-keycloak
    restart: always
    command: ["start-dev"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak123
    depends_on:
      - postgres
    ports:
      - "8081:8080"
    networks:
      - essie-net

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: essie-mosquitto
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    networks:
      - essie-net

  telemetry:
    build:
      context: .
      dockerfile: Dockerfile.telemetry
    container_name: essie-telemetry
    restart: always
    depends_on:
      - influxdb
      - mosquitto
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=my-secret-token
      - INFLUX_ORG=essie_org
      - INFLUX_BUCKET=essie_telemetry
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
    networks:
      - essie-net
    command: >
      sh -c "
        python sensor_hub.py &
        python telemetry_db_writer.py &
        python blackbox_logger.py &
        python offline_replay.py &
        python encryption_layer.py &
        python comms_router.py &
        python telemetry_server.py
        wait
      "
    volumes:
      - telemetry-spool:/app/spool

  uplink-monitor:
    image: python:3.11-slim
    container_name: essie-uplink-monitor
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: "1883"
      MQTT_TOPIC: hab/network/uplink
      PING_HOST: "1.1.1.1"
      PING_TIMEOUT_S: "2"
      INTERVAL_S: "10"
      ENABLE_SPEEDTEST: "0"
      SPEEDTEST_EVERY_S: "1800"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./uplink_monitor.py:/app/uplink_monitor.py:ro
    working_dir: /app
    command: >
      sh -c "
      apt-get update &&
      apt-get install -y iputils-ping &&
      pip install --no-cache-dir paho-mqtt requests &&
      python /app/uplink_monitor.py
      "
    networks:
      - essie-net

  cam_heartbeat:
    build:
      context: .
      dockerfile: Dockerfile.cam-heartbeat
    container_name: essie-cam-heartbeat
    restart: always
    depends_on:
      - influxdb
      - mosquitto
    networks:
      - essie-net
    command: >
      sh -c "python camera_heartbeat.py"

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: essie-mediamtx
    restart: always
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    networks:
      - essie-net

  ajax_ingestor:
    build:
      context: .
      dockerfile: Dockerfile.telemetry
    container_name: essie-ajax-ingestor
    restart: always
    depends_on:
      - mosquitto
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - AJAX_MQTT_PREFIX=ajax
      - AJAX_PUBLISH_INTERVAL_SEC=5
    networks:
      - essie-net
    command: >
      sh -c "python ajax_ingestor.py"

  openmct:
    build: ./openmct
    image: essie-openmct
    container_name: essie-openmct
    restart: always
    depends_on:
      - influxdb
      - mosquitto
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    networks:
      - essie-net

  grafana:
    image: grafana/grafana:10.4.5
    container_name: essie-grafana
    restart: unless-stopped
    ports:
      - "4000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_SERVER_DOMAIN=localhost
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./static-files:/usr/share/grafana/public/static-files
    networks:
      - essie-net

  nodered:
    image: nodered/node-red:3.1.9-18
    container_name: essie-nodered
    restart: always
    depends_on:
      - mosquitto
      - influxdb
    ports:
      - "1880:1880"
    volumes:
      - nodered-data:/data
    networks:
      - essie-net

  static-server:
    build:
      context: .
      dockerfile: Dockerfile.static
    container_name: essie-static-server
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./static-files:/app/static-files
    networks:
      - essie-net

  dashboard:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        BUILD_TARGET: generic
        REACT_APP_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    image: essie-dashboard
    container_name: essie-dashboard
    restart: always
    depends_on:
      - influxdb
      - mosquitto
    ports:
      - "3000:80"
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=my-secret-token
      - INFLUX_ORG=essie_org
      - INFLUX_BUCKET=essie_telemetry
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
    networks:
      - essie-net

  dashboard-hab:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        BUILD_TARGET: hab
        REACT_APP_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    image: essie-dashboard-hab
    container_name: essie-dashboard-hab
    restart: always
    depends_on:
      - influxdb
      - mosquitto
      - efn-hab
    ports:
      - "3200:80"
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=my-secret-token
      - INFLUX_ORG=essie_org
      - INFLUX_BUCKET=essie_telemetry
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
    networks:
      - essie-net

  dashboard-mcc:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        BUILD_TARGET: mcc
        REACT_APP_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    image: essie-dashboard-mcc
    container_name: essie-dashboard-mcc
    restart: always
    depends_on:
      - influxdb
      - mosquitto
      - efn-mcc
    ports:
      - "3300:80"
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=my-secret-token
      - INFLUX_ORG=essie_org
      - INFLUX_BUCKET=essie_telemetry
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
    networks:
      - essie-net

  telemetry-log:
    image: busybox
    container_name: essie-telemetry-log
    command: sh -c "tail -f /logs/telemetry.log"
    volumes:
      - ./telemetry.log:/logs/telemetry.log:ro
    networks:
      - essie-net

  local-weather:
    build:
      context: .
      dockerfile: Dockerfile.local-weather
    container_name: essie-local-weather
    restart: always
    depends_on:
      - mosquitto
    networks:
      - essie-net
    command: >
      sh -c "python local_weather.py"

  efn-hab:
    build:
      context: .
      dockerfile: Dockerfile.efn
    container_name: essie-efn-hab
    restart: always
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      - SERVER_ROLE=hab
      - PEER_URL=http://efn-mcc:8000
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=my-secret-token
      - INFLUX_ORG=essie_org
      - INFLUX_BUCKET=essie_telemetry
      - MARS_DELAY_MIN=1
    volumes:
      - ./audio_logs:/app/audio_logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8100:8000"
    networks:
      - essie-net

  efn-mcc:
    build:
      context: .
      dockerfile: Dockerfile.efn
    container_name: essie-efn-mcc
    restart: always
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      - SERVER_ROLE=mcc
      - PEER_URL=http://efn-hab:8000
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=my-secret-token
      - INFLUX_ORG=essie_org
      - INFLUX_BUCKET=essie_telemetry
      - MARS_DELAY_MIN=1
    volumes:
      - ./audio_logs:/app/audio_logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8110:8000"
    networks:
      - essie-net

  bio-ingest:
    build:
      context: ./
      dockerfile: Dockerfile.bio-ingest
    container_name: essie-bio-ingest
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: "1883"
      MQTT_BASE: hab/biometric
      SOURCE: phone
      DEVICE_TTL_S: "1800"
      PYTHONUNBUFFERED: "1"
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    ports:
      - "8200:8000"
    networks:
      - essie-net

  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - ./ha-config:/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    privileged: true
    ports:
      - "8123:8123"
    networks:
      - essie-net
 
  nginx-gateway:
    image: nginx:alpine
    container_name: essie-nginx
    restart: always
    ports:
      - "8088:80"   # laptop test: http://localhost:8088/hab
    volumes:
      - ./ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - dashboard-hab
      - dashboard-mcc
      - bio-ingest
      - mosquitto
      - mediamtx
      - efn-hab
    networks:
      - essie-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: essie-cloudflared
    restart: unless-stopped
    depends_on:
      - nginx-gateway
    command: tunnel --config /etc/cloudflared/config.yml --no-autoupdate run essie-tunnel
    volumes:
      - /home/info_aakaspacestudio_com/.cloudflared:/etc/cloudflared:ro
    networks:
      - essie-net

volumes:
   influxdb-data:
   postgres-data:
   mosquitto-data:
   nodered-data:
   static-files:
   telemetry-log:
   audio_logs:
   telemetry-spool:
